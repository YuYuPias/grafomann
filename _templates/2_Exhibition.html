<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ВЫСТАВКА</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f3ed;
    color: #222;
    line-height: 1.8;
}

.article-nav {
    max-width: 1100px;
    margin: 30px auto 0;
    padding: 0 40px;
}

.article-nav a {
    color: #666;
    text-decoration: none;
    margin-right: 20px;
    font-size: 0.9rem;
}

.article-nav a:hover {
    text-decoration: underline;
}

.article {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px;
}

h1 {
    max-width: 1000px;
    font-size: 3rem;
    font-weight: normal;
    margin: 0 auto 25px auto;
    color: #555;
}

.date {
    max-width: 1000px;
    margin: 0 auto 32px auto;
    color: #888;
    font-size: 14px;
}

p {
    max-width: 1000px;
    font-size: 1.15rem;
    margin: 0 auto 22px auto;
    color: #555;
}

.section-title {
    max-width: 1000px;
    margin: 70px auto 24px auto;
    font-size: 1.35rem;
    font-weight: normal;
    color: #444;
}

/* Большой акцентный кадр */
.single {
    text-align: center;
    margin: 48px 0;
}

.single img {
    max-width: 1000px;
    width: 100%;
    height: auto;
    display: inline-block;
}

/* Уменьшенный одиночный кадр */
.single.small img {
    width: 65%;
}

/* Модульная выставочная сетка */
.exhibition-grid {
    max-width: 1000px;
    margin: 48px auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

/* Сетка 3×2 */
.exhibition-grid.six {
    grid-template-rows: repeat(2, 230px);
}

/* Сетка 3×3 */
.exhibition-grid.nine {
    grid-template-rows: repeat(3, 220px);
}

.exhibition-grid a {
    display: block;
    overflow: hidden;
}

.exhibition-grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* Крупные ячейки внутри сетки */
.exhibition-grid .wide {
    grid-column: span 2;
}

.exhibition-grid .tall {
    grid-row: span 2;
}

.exhibition-grid .big {
    grid-column: span 2;
    grid-row: span 2;
}

/* Финальная пара: горизонталь + вертикаль */
.final-pair {
    max-width: 1000px;
    margin: 55px auto;
    display: grid;
    grid-template-columns: 1.45fr 1fr;
    gap: 12px;
    align-items: stretch;
}

.final-pair a {
    display: block;
    overflow: hidden;
}

.final-pair img {
    width: 100%;
    height: 520px;
    object-fit: cover;
    display: block;
}

/* Обычная пара */
.gallery-two {
    max-width: 1000px;
    margin: 48px auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.gallery-two img {
    width: 100%;
    height: auto;
    display: block;
}

.bottom-nav {
    text-align: center;
    margin: 80px 0 40px 0;
}

.bottom-nav a {
    color: #666;
    text-decoration: none;
    font-size: 0.9rem;
}

.lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    inset: 0;
    background: rgba(0, 0, 0, 0.96);
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.lightbox.active {
    display: flex;
}

.lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
}

.lightbox img.dragging {
    cursor: grabbing;
}

.lightbox-close {
    position: fixed;
    top: 22px;
    right: 28px;
    color: #e8dcc5;
    font-size: 30px;
    cursor: pointer;
    z-index: 10002;
}

.lightbox-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    font-size: 48px;
    color: #d9cdb8;
    cursor: pointer;
    user-select: none;
    z-index: 10002;
}

.lightbox-prev {
    left: 30px;
}

.lightbox-next {
    right: 30px;
}

.lightbox-controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10001;
    display: flex;
    gap: 22px;
}

.lightbox-controls button {
    border: none;
    background: none;
    color: #e8dcc5;
    font-size: 32px;
    cursor: pointer;
}

@media (max-width: 800px) {
    .article-nav {
        padding: 0 24px;
        margin-top: 35px;
    }

    .article {
        padding: 50px 24px;
    }

    h1 {
        font-size: 2rem;
    }

    .exhibition-grid,
    .gallery-two,
    .final-pair {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
    }

    .exhibition-grid a,
    .exhibition-grid .wide,
    .exhibition-grid .tall,
    .exhibition-grid .big {
        grid-column: auto;
        grid-row: auto;
    }

    .exhibition-grid img,
    .final-pair img {
        height: auto;
    }

    .single.small img {
        width: 100%;
    }
}
</style>
</head>

<body>

<header class="article-nav">
    <a href="../../">ГрафоМанн</a>
    <a href="../">РАЗДЕЛ</a>
</header>

<div class="article">

<h1>НАЗВАНИЕ ВЫСТАВКИ</h1>
<div class="date">ДАТА</div>

<p>
Вступительный текст. Здесь задается тема выставки, ее интонация и главный принцип отбора.
</p>

<p>
Второй абзац — если нужен. Лучше коротко: выставочный шаблон должен оставлять пространство фотографиям.
</p>

<div class="single">
    <a href="photo-01.jpg"><img src="photo-01.jpg" alt=""></a>
</div>

<div class="exhibition-grid nine">
    <a href="photo-02.jpg" class="big"><img src="photo-02.jpg" alt=""></a>
    <a href="photo-03.jpg"><img src="photo-03.jpg" alt=""></a>
    <a href="photo-04.jpg"><img src="photo-04.jpg" alt=""></a>
    <a href="photo-05.jpg" class="tall"><img src="photo-05.jpg" alt=""></a>
    <a href="photo-06.jpg"><img src="photo-06.jpg" alt=""></a>
    <a href="photo-07.jpg"><img src="photo-07.jpg" alt=""></a>
</div>

<div class="single small">
    <a href="photo-08.jpg"><img src="photo-08.jpg" alt=""></a>
</div>

<div class="exhibition-grid six">
    <a href="photo-09.jpg"><img src="photo-09.jpg" alt=""></a>
    <a href="photo-10.jpg"><img src="photo-10.jpg" alt=""></a>
    <a href="photo-11.jpg"><img src="photo-11.jpg" alt=""></a>
    <a href="photo-12.jpg" class="wide"><img src="photo-12.jpg" alt=""></a>
    <a href="photo-13.jpg"><img src="photo-13.jpg" alt=""></a>
</div>

<div class="single">
    <a href="photo-14.jpg"><img src="photo-14.jpg" alt=""></a>
</div>

<div class="gallery-two">
    <a href="photo-15.jpg"><img src="photo-15.jpg" alt=""></a>
    <a href="photo-16.jpg"><img src="photo-16.jpg" alt=""></a>
</div>

<div class="final-pair">
    <a href="photo-17.jpg"><img src="photo-17.jpg" alt=""></a>
    <a href="photo-18.jpg"><img src="photo-18.jpg" alt=""></a>
</div>

<div class="bottom-nav">
    <a href="#">↑ Наверх</a>
</div>

</div>

<div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">×</div>
    <div class="lightbox-arrow lightbox-prev" id="prevImage">‹</div>
    <img id="lightboxImage" src="" alt="">
    <div class="lightbox-arrow lightbox-next" id="nextImage">›</div>
    <div class="lightbox-controls">
        <button id="zoomOut">−</button>
        <button id="zoomIn">+</button>
    </div>
</div>

<script>
const galleryLinks = Array.from(document.querySelectorAll('.single a, .exhibition-grid a, .gallery-two a, .final-pair a'));
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const closeButton = document.getElementById('lightboxClose');
const zoomIn = document.getElementById('zoomIn');
const zoomOut = document.getElementById('zoomOut');
const prevImage = document.getElementById('prevImage');
const nextImage = document.getElementById('nextImage');

let currentIndex = 0;
let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX = 0;
let startY = 0;

function updateImageTransform() {
    lightboxImage.style.transform =
        `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function resetView() {
    scale = 1;
    posX = 0;
    posY = 0;
    updateImageTransform();
}

function showImage(index) {
    currentIndex = index;

    if (currentIndex < 0) {
        currentIndex = galleryLinks.length - 1;
    }

    if (currentIndex >= galleryLinks.length) {
        currentIndex = 0;
    }

    lightboxImage.src = galleryLinks[currentIndex].href;
    resetView();
    lightbox.classList.add('active');
}

galleryLinks.forEach((link, index) => {
    link.addEventListener('click', function(event) {
        event.preventDefault();
        showImage(index);
    });
});

nextImage.addEventListener('click', (event) => {
    event.stopPropagation();
    showImage(currentIndex + 1);
});

prevImage.addEventListener('click', (event) => {
    event.stopPropagation();
    showImage(currentIndex - 1);
});

zoomIn.addEventListener('click', (event) => {
    event.stopPropagation();
    if (scale < 4) {
        scale += 0.5;
        updateImageTransform();
    }
});

zoomOut.addEventListener('click', (event) => {
    event.stopPropagation();
    if (scale > 1) {
        scale -= 0.5;
        if (scale === 1) {
            posX = 0;
            posY = 0;
        }
        updateImageTransform();
    }
});

lightboxImage.addEventListener('mousedown', (event) => {
    if (scale <= 1) return;
    isDragging = true;
    lightboxImage.classList.add('dragging');
    startX = event.clientX - posX;
    startY = event.clientY - posY;
});

document.addEventListener('mousemove', (event) => {
    if (!isDragging) return;
    posX = event.clientX - startX;
    posY = event.clientY - startY;
    updateImageTransform();
});

document.addEventListener('mouseup', () => {
    isDragging = false;
    lightboxImage.classList.remove('dragging');
});

closeButton.addEventListener('click', () => {
    lightbox.classList.remove('active');
});

lightbox.addEventListener('click', (event) => {
    if (event.target === lightbox) {
        lightbox.classList.remove('active');
    }
});

document.addEventListener('keydown', (event) => {
    if (!lightbox.classList.contains('active')) return;

    if (event.key === 'Escape') {
        lightbox.classList.remove('active');
    }

    if (event.key === 'ArrowRight') {
        showImage(currentIndex + 1);
    }

    if (event.key === 'ArrowLeft') {
        showImage(currentIndex - 1);
    }
});
</script>

</body>
</html>
