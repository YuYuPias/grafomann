<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Италия — ГрафоМанн</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f3ed;
            color: #222;
            line-height: 1.7;
        }

        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 40px 60px 40px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
            font-size: 0.9rem;
        }

        .logo {
            color: #777;
            text-decoration: none;
            font-size: 1.7rem;
            position: relative;
            left: -40px;
        }

        .menu a,
        .menu .current {
            display: inline-block;
            margin-left: 24px;
            color: #666;
            text-decoration: none;
        }

        .menu .current {
            color: #c98b5c;
        }

        .texts-link {
            border-left: 1px solid #999;
            padding-left: 32px;
        }

        .hero {
            width: 92%;
            margin: 0 0 60px auto;
            position: relative;
            left: -80px;
        }

        .hero img {
            width: 100%;
            display: block;
            opacity: 0.45;
        }

        .post-list {
            width: 92%;
            margin-left: 0;
        }

        .post-item {
            padding: 22px 0;
            border-bottom: 1px solid #ddd6cc;
        }

        h2 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: normal;
        }

        h2 a {
            color: #333;
            text-decoration: none;
        }

        h2 a:hover {
            color: #666;
        }

        .date {
            color: #888;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .bottom-nav {
            text-align: center;
            margin-top: 70px;
        }

        .bottom-nav a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div class="page">

    <nav>
        <a href="../" class="logo">ГрафоМанн</a>

        <div class="menu">
            <a href="../uk/">Великобритания</a>
            <a href="../france/">Франция</a>
            <a href="../spain/">Испания</a>
          <span class="current">Италия</span>
            <a href="../texts/" class="texts-link">Тексты</a>
        </div>
    </nav>

    <div class="hero">
        <img src="italy-cover.jpg" alt="">
    </div>

    <div class="post-list">

        <div class="post-item">
            <h2>
                <a href="Marinella di Selinunte/">Рыбный аукцион в Marinella di Selinunte</a>
            </h2>
            <div class="date">23 августа 2021</div>
        </div>

        <div class="post-item">
            <h2>
                <a href="Selinunte-day-night/">Силинунт. День и ночь</a>
            </h2>
            <div class="date">17 августа 2021</div>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="#">↑ Наверх</a>
    </div>

</div>

</body>
</html>
