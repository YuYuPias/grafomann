<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f3ed;
    color: #222;
    line-height: 1.8;
}

.article-nav {
    max-width: 1100px;
    margin: 30px auto 0;
    padding: 0 40px;
}

.article-nav a {
    color: #666;
    text-decoration: none;
    margin-right: 20px;
    font-size: 0.9rem;
}

.article-nav a:hover {
    text-decoration: underline;
}

.article {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px;
}

h1 {
    max-width: 1000px;
    font-size: 3rem;
    font-weight: normal;
    margin: 0 auto 25px auto;
    color: #555;
}

.date {
    max-width: 1000px;
    margin: 0 auto 32px auto;
    color: #888;
    font-size: 14px;
}

p {
    max-width: 1000px;
    font-size: 1.15rem;
    margin: 0 auto 42px auto;
    color: #555;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 45px 0;
}

.gallery a {
    display: block;
}

.gallery img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
}

.bottom-nav {
    text-align: center;
    margin: 80px 0 40px 0;
}

.bottom-nav a {
    color: #666;
    text-decoration: none;
    font-size: 0.9rem;
}

/* Lightbox */

.lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    inset: 0;
    background: rgba(0, 0, 0, 0.96);
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.lightbox.active {
    display: flex;
}

.lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
}

.lightbox img.dragging {
    cursor: grabbing;
}

.lightbox-close {
    position: fixed;
    top: 22px;
    right: 28px;
    color: #e8dcc5;
    font-size: 30px;
    cursor: pointer;
    z-index: 10002;
}

.lightbox-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    font-size: 48px;
    color: #d9cdb8;
    cursor: pointer;
    user-select: none;
    z-index: 10002;
}

.lightbox-prev {
    left: 30px;
}

.lightbox-next {
    right: 30px;
}

.lightbox-controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10001;
    display: flex;
    gap: 22px;
}

.lightbox-controls button {
    border: none;
    background: none;
    color: #e8dcc5;
    font-size: 32px;
    cursor: pointer;
}

@media (max-width: 800px) {
    .article {
        padding: 40px 22px;
    }

    h1 {
        font-size: 2rem;
    }

    .gallery {
        grid-template-columns: 1fr;
    }

    .gallery img {
        height: auto;
    }
}
</style>
</head>

<div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">×</div>
    <div class="lightbox-arrow lightbox-prev" id="prevImage">‹</div>
    <div class="lightbox-arrow lightbox-next" id="nextImage">›</div>

    <div class="lightbox-controls">
        <button id="zoomOut">−</button>
        <button id="zoomIn">+</button>
    </div>

    <img id="lightboxImage" src="" alt="">
</div>

<script>
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const closeButton = document.getElementById('lightboxClose');
const zoomIn = document.getElementById('zoomIn');
const zoomOut = document.getElementById('zoomOut');
const prevImage = document.getElementById('prevImage');
const nextImage = document.getElementById('nextImage');

const galleryLinks = Array.from(document.querySelectorAll('.gallery a'));

let currentIndex = 0;
let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX = 0;
let startY = 0;

function updateImageTransform() {
    lightboxImage.style.transform =
        `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function resetView() {
    scale = 1;
    posX = 0;
    posY = 0;
    updateImageTransform();
}

function showImage(index) {
    currentIndex = index;

    if (currentIndex < 0) currentIndex = galleryLinks.length - 1;
    if (currentIndex >= galleryLinks.length) currentIndex = 0;

    lightboxImage.src = galleryLinks[currentIndex].href;
    resetView();
    lightbox.classList.add('active');
}

galleryLinks.forEach((link, index) => {
    link.addEventListener('click', function(event) {
        event.preventDefault();
        showImage(index);
    });
});

nextImage.addEventListener('click', (event) => {
    event.stopPropagation();
    showImage(currentIndex + 1);
});

prevImage.addEventListener('click', (event) => {
    event.stopPropagation();
    showImage(currentIndex - 1);
});

zoomIn.addEventListener('click', (event) => {
    event.stopPropagation();
    if (scale < 4) {
        scale += 0.5;
        updateImageTransform();
    }
});

zoomOut.addEventListener('click', (event) => {
    event.stopPropagation();
    if (scale > 1) {
        scale -= 0.5;
        if (scale === 1) {
            posX = 0;
            posY = 0;
        }
        updateImageTransform();
    }
});

lightboxImage.addEventListener('mousedown', (event) => {
    if (scale <= 1) return;
    isDragging = true;
    lightboxImage.classList.add('dragging');
    startX = event.clientX - posX;
    startY = event.clientY - posY;
});

document.addEventListener('mousemove', (event) => {
    if (!isDragging) return;
    posX = event.clientX - startX;
    posY = event.clientY - startY;
    updateImageTransform();
});

document.addEventListener('mouseup', () => {
    isDragging = false;
    lightboxImage.classList.remove('dragging');
});

closeButton.addEventListener('click', () => {
    lightbox.classList.remove('active');
});

lightbox.addEventListener('click', (event) => {
    if (event.target === lightbox) {
        lightbox.classList.remove('active');
    }
});

document.addEventListener('keydown', (event) => {
    if (!lightbox.classList.contains('active')) return;

    if (event.key === 'Escape') lightbox.classList.remove('active');
    if (event.key === 'ArrowRight') showImage(currentIndex + 1);
    if (event.key === 'ArrowLeft') showImage(currentIndex - 1);
});
</script>
