<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ГрафоМанн</title>

<style>
body {
    margin: 0;
    background: #f7f4ef;
    color: #222;
    font-family: Georgia, serif;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 50px;
    background: #f7f4ef;
    border-bottom: 1px solid #d9d4cc;
}

.logo {
    font-size: 3.2rem;
}

nav a {
    text-decoration: none;
    color: #222;
    margin-left: 30px;
    font-size: 1.15rem;
}

.texts-link {
    border-left: 1px solid #999;
    padding-left: 30px;
}

.hero {
    width: 100%;
    height: 360px;
    background-image: url('kiev-la-gare.jpg');
    background-size: cover;
    background-position: 58% 55%;
    background-repeat: no-repeat;
}

.intro {
    max-width: 900px;
    margin: 30px auto 10px auto;
    padding: 0 40px;
}

.intro p {
    font-size: 1.4rem;
    color: #7d6855;
    margin: 0;
}

.posts {
    max-width: 900px;
    margin: 25px auto 60px auto;
    padding: 0 40px;
}

.post {
    border-top: 1px solid #ddd;
    padding: 25px 0;
}

.post h2 {
    margin: 0 0 8px 0;
    font-weight: normal;
    font-size: 1.4rem;
}

.date {
    color: #7a7a7a;
    font-size: 0.95rem;
}

footer {
    border-top: 1px solid #d9d4cc;
    padding: 25px 50px;
    display: flex;
    justify-content: space-between;
}
</style>

</head>

<body>

<header>

<div class="topbar">

<div class="logo">ГрафоМанн</div>

<nav>
<a href="#">Великобритания</a>
<a href="#">Франция</a>
<a href="#">Испания</a>
<a href="#">Италия</a>
<a href="#" class="texts-link">Тексты</a>
</nav>

</div>

</header>

<div class="hero"></div>

<section class="intro">

<p>Наблюдения, прогулки, тексты.</p>

</section>

<section class="posts">

<div class="post">
<h2>Резервуар Сен-Мор-де-Фоссе</h2>
<div class="date">11 июня 2026</div>
</div>

<div class="post">
<h2>Дом на улице Jules Ferry</h2>
<div class="date">8 июня 2026</div>
</div>

<div class="post">
<h2>Рельеф с платанами на avenue Daumesnil</h2>
<div class="date">5 июня 2026</div>
</div>

</section>

<footer>

<div>© ГрафоМанн</div>

<div>
О проекте &nbsp;&nbsp;&nbsp; Контакты
</div>

</footer>

</body>
</html>
